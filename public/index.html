<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTU Extractor — Trinus</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #131318;
    --surface2: #1a1a22;
    --border: #2a2a38;
    --accent: #e8ff47;
    --accent2: #7b5cff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #3ddc84;
    --error: #ff5959;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(123,92,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,92,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .logo-text span { color: var(--accent); }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; }

  .layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .card-title {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content: ''; display: block; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

  label { display: block; font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 5px; }
  input[type="password"], input[type="text"] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    padding: 10px 14px; width: 100%; transition: border-color 0.2s; outline: none;
  }
  input:focus { border-color: var(--accent2); }

  .api-status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 7px 10px; border-radius: 5px; margin-top: 8px; display: none; }
  .api-status.ok { background: rgba(61,220,132,0.1); color: var(--success); display: block; }
  .api-status.err { background: rgba(255,89,89,0.1); color: var(--error); display: block; }
  .api-status.loading { background: rgba(123,92,255,0.1); color: var(--accent2); display: block; }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 14px;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(232,255,71,0.03); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .drop-label { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .drop-sub { font-size: 11px; color: var(--muted); }

  .file-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .file-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'IBM Plex Mono', monospace;
  }
  .file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fsize { color: var(--muted); flex-shrink: 0; }
  .file-item .fdel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0; transition: color 0.15s; flex-shrink: 0; }
  .file-item .fdel:hover { color: var(--error); }
  .file-item.processing { border-color: var(--accent2); }
  .file-item.done { border-color: var(--success); }
  .file-item.error { border-color: var(--error); }

  .btn {
    border: none; border-radius: 8px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px; padding: 11px 18px;
    transition: all 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;
  }
  .btn:last-child { margin-bottom: 0; }
  .btn-primary { background: var(--accent); color: #0c0c0f; }
  .btn-primary:hover:not(:disabled) { background: #f5ff6e; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,255,71,0.2); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-export { background: var(--accent2); color: #fff; }
  .btn-export:hover:not(:disabled) { background: #9070ff; transform: translateY(-1px); }
  .btn-export:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--muted); }
  .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-sm { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 5px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; width: auto; margin-bottom: 0; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .progress-area { margin-top: 16px; display: none; }
  .progress-area.active { display: block; }
  .progress-header { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .progress-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .log { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.7; max-height: 130px; overflow-y: auto; }
  .log-line { color: var(--muted); }
  .log-line.ok { color: var(--success); }
  .log-line.err { color: var(--error); }
  .log-line.hi { color: var(--accent); }

  /* Right column */
  .right-panel { }
  .stats { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 80px; }
  .stat-n { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); }
  .stat-l { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-scroll { overflow-x: auto; max-height: 520px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface2); color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; padding: 10px 12px;
    text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
    position: sticky; top: 0; z-index: 1;
  }
  tbody tr { border-bottom: 1px solid rgba(42,42,56,0.6); transition: background 0.1s; }
  tbody tr:hover { background: rgba(123,92,255,0.04); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 12px; vertical-align: middle; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
  td.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  td.spe { color: var(--accent); font-weight: 500; }
  td.val { color: var(--success); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  td.rn { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 10px; width: 28px; }
  .tag-err { background: rgba(255,89,89,0.12); color: var(--error); border-radius: 4px; padding: 2px 7px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; }
  .tag-ok { background: rgba(61,220,132,0.12); color: var(--success); border-radius: 4px; padding: 2px 7px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; }
  .empty { text-align: center; padding: 60px 40px; color: var(--muted); }
  .empty .icon { font-size: 36px; opacity: 0.3; display: block; margin-bottom: 10px; }
  .empty p { font-size: 13px; line-height: 1.6; }
  .edit-c { background: transparent; border: none; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; width: 100%; outline: none; min-width: 120px; }
  .edit-c:focus { background: var(--surface2); border-radius: 3px; padding: 2px 5px; margin: -2px -5px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(12,12,15,0.3); border-top-color: #0c0c0f; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo-text">IPTU<span>Extractor</span></div>
      <div class="logo-sub">PDF → Excel · AI Powered · Trinus</div>
    </div>
    <span class="badge">v1.1</span>
  </header>

  <div class="layout">
    <!-- LEFT -->
    <div>
      <!-- API Config -->
      <div class="card">
        <div class="card-title">Configuração de IA</div>
        <div style="margin-bottom:12px;">
          <label>Provedor</label>
          <select id="apiProvider" style="background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; outline: none; width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; margin-bottom: 12px;">
            <option value="anthropic">Claude 3.5 Sonnet (Anthropic)</option>
            <option value="gemini-3">Gemini 3 Flash Preview (Google)</option>
            <option value="gemini-2.5">Gemini 2.5 Flash (Google)</option>
          </select>
          <label>Chave de API</label>
          <input type="password" id="apiKey" placeholder="sk-ant-... ou AIzaSy..." autocomplete="off">
        </div>
        <button class="btn-sm" onclick="testKey()">Testar conexão</button>
        <div class="api-status" id="apiStatus"></div>
      </div>

      <!-- Upload -->
      <div class="card">
        <div class="card-title">Upload de PDFs</div>
        <div class="drop-zone" id="dropZone"
          ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept=".pdf" multiple onchange="addFiles(this.files)">
          <span class="drop-icon">📄</span>
          <div class="drop-label">Arraste PDFs aqui</div>
          <div class="drop-sub">ou clique · múltiplos arquivos</div>
        </div>

        <div class="file-list" id="fileList"></div>

        <button class="btn btn-primary" id="btnExtract" onclick="runExtraction()" disabled>Extrair dados</button>
        <button class="btn btn-export" id="btnExport" onclick="exportExcel()" disabled>⬇ Exportar Excel</button>
        <button class="btn btn-ghost" id="btnClear" onclick="clearAll()" disabled>Limpar tudo</button>

        <div class="progress-area" id="progressArea">
          <div class="progress-header">
            <span id="progressText">Aguardando…</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
      <div class="stats" id="stats" style="display:none;">
        <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Total</div></div>
        <div class="stat"><div class="stat-n" id="sOk" style="color:var(--success)">0</div><div class="stat-l">Extraídos</div></div>
        <div class="stat"><div class="stat-n" id="sErr" style="color:var(--error)">0</div><div class="stat-l">Erros</div></div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="card-title" style="margin:0;">Resultados</div>
        </div>
        <div class="table-scroll" id="tableScroll">
          <div class="empty">
            <span class="icon">🗂</span>
            <p>Faça upload dos PDFs e clique em <strong>Extrair dados</strong> para iniciar a tabulação.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const COLS = [
  { key: 'nome_documento',      label: 'Nome do Documento',   cls: '' },
  { key: 'spe',                 label: 'SPE',                 cls: 'spe' },
  { key: 'inscricao_cadastral', label: 'Inscrição Cadastral', cls: 'mono' },
  { key: 'endereco',            label: 'Endereço',            cls: '' },
  { key: 'validade',            label: 'Validade',            cls: 'mono' },
  { key: 'valor_principal',     label: 'Valor Principal',     cls: 'val' },
  { key: 'total_a_pagar',       label: 'Total a Pagar',       cls: 'val' },
  { key: 'duam',                label: 'DUAM',                cls: 'mono' },
  { key: 'codigo_barras',       label: 'Código de Barras',    cls: 'mono' },
  { key: 'comentario',          label: 'Comentário',          cls: '' },
];

let files = [];
let results = [];
let busy = false;

// ── Files ──
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('drag-over'); addFiles(e.dataTransfer.files); }

function addFiles(incoming) {
  for (const f of incoming) {
    if (f.type === 'application/pdf' && !files.find(x => x.name === f.name)) files.push(f);
  }
  renderFiles();
}

function removeFile(i) { files.splice(i, 1); renderFiles(); }

function renderFiles() {
  const el = document.getElementById('fileList');
  el.innerHTML = files.map((f, i) => `
    <div class="file-item" id="fi-${i}">
      <span>📄</span>
      <span class="fname">${f.name}</span>
      <span class="fsize">${(f.size/1024).toFixed(0)} KB</span>
      <button class="fdel" onclick="removeFile(${i})">×</button>
    </div>`).join('');
  updateButtons();
}

function setFileState(i, state) {
  const el = document.getElementById('fi-' + i);
  if (!el) return;
  el.className = 'file-item ' + state;
  const icons = { processing: '⏳', done: '✅', error: '❌' };
  if (icons[state]) el.querySelector('span').textContent = icons[state];
}

function updateButtons() {
  document.getElementById('btnExtract').disabled = files.length === 0 || busy;
  document.getElementById('btnExport').disabled = results.length === 0;
  document.getElementById('btnClear').disabled = files.length === 0 && results.length === 0;
}

// ── API Key ──
async function testKey() {
  const key = document.getElementById('apiKey').value.replace(/[^\x20-\x7E]/g, '').trim();
  const provider = document.getElementById('apiProvider').value;
  if (!key) { showStatus('Insira uma API key', 'err'); return; }
  showStatus('Testando…', 'loading');
  try {
    const r = await fetch('/api/test-key', { method: 'POST', headers: { 'x-api-key': key, 'x-api-provider': provider } });
    const d = await r.json();
    if (d.success) showStatus('✓ Conectado com sucesso', 'ok');
    else showStatus('✗ ' + d.error, 'err');
  } catch(e) { showStatus('✗ Erro: ' + e.message, 'err'); }
}

function showStatus(msg, type) {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status ' + type;
}

// ── Extraction ──
async function runExtraction() {
  const key = document.getElementById('apiKey').value.replace(/[^\x20-\x7E]/g, '').trim();
  const provider = document.getElementById('apiProvider').value;
  if (!key) { alert('Insira sua API key.'); return; }
  if (!files.length) return;

  busy = true;
  results = [];
  updateButtons();
  document.getElementById('progressArea').classList.add('active');
  document.getElementById('log').innerHTML = '';
  logLine(`Iniciando extração de ${files.length} arquivo(s)…`, 'hi');

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    setProgress(i, files.length, `[${i+1}/${files.length}] ${f.name}`);
    setFileState(i, 'processing');
    logLine(`Enviando: ${f.name}`, '');

    try {
      const fd = new FormData();
      fd.append('pdf', f);
      const r = await fetch('/api/extract', { method: 'POST', headers: { 'x-api-key': key, 'x-api-provider': provider }, body: fd });
      
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        
        const lines = buffer.split('\n\n');
        buffer = lines.pop(); // O último trecho fica no buffer até estar completo
        
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const payload = JSON.parse(line.substring(6));
             if (payload.type === 'chunk') {
                const arr = Array.isArray(payload.data) ? payload.data : [payload.data];
                arr.forEach(item => results.push({ ...item, _status: 'ok' }));
                setProgress(Math.round(payload.progress * 100), 100, `Analisando páginas... ${Math.round(payload.progress * 100)}%`);
                renderTable();
                logLine(`  ↳ Lote processado (+${arr.length} guias)`, 'ok');
             } else if (payload.type === 'error') {
                results.push({ nome_documento: f.name, _status: 'error', _error: payload.error });
                setFileState(i, 'error');
                logLine(`  ✗ ${payload.error}`, 'err');
                renderTable();
             } else if (payload.type === 'done') {
                setFileState(i, 'done');
                logLine(`  ✓ Arquivo totalmente extraído`, 'ok');
             }
          }
        }
      }
    } catch(e) {
      results.push({ nome_documento: f.name, _status: 'error', _error: e.message });
      setFileState(i, 'error');
      logLine(`  ✗ Erro de rede: ${e.message}`, 'err');
      renderTable();
    }
  }

  setProgress(files.length, files.length, 'Concluído');
  logLine('─── Extração finalizada ───', 'hi');
  busy = false;
  updateButtons();
}

function setProgress(done, total, label) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressText').textContent = label;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function logLine(msg, type) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-line ' + (type || '');
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ── Table ──
function renderTable() {
  const ok = results.filter(r => r._status === 'ok').length;
  const err = results.filter(r => r._status === 'error').length;
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('sTotal').textContent = results.length;
  document.getElementById('sOk').textContent = ok;
  document.getElementById('sErr').textContent = err;

  if (!results.length) return;

  let html = '<table><thead><tr><th>#</th>';
  COLS.forEach(c => { html += `<th>${c.label}</th>`; });
  html += '</tr></thead><tbody>';

  results.forEach((row, i) => {
    html += '<tr>';
    html += `<td class="rn">${i+1}</td>`;
    if (row._status === 'error') {
      html += `<td><span class="tag-err">ERRO</span> <span style="font-size:11px;color:var(--muted)">${h(row.nome_documento)}</span></td>`;
      html += `<td colspan="${COLS.length-1}" style="color:var(--error);font-size:11px;font-family:'IBM Plex Mono',monospace;">${h(row._error)}</td>`;
    } else {
      COLS.forEach(c => {
        const v = row[c.key] || '';
        if (c.key === 'comentario') {
          html += `<td class="${c.cls}"><input class="edit-c" type="text" value="${h(v)}" onchange="updateRow(${i},'comentario',this.value)" placeholder="—"></td>`;
        } else {
          html += `<td class="${c.cls}" title="${h(v)}">${v ? h(v) : '<span style="color:var(--muted)">—</span>'}</td>`;
        }
      });
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableScroll').innerHTML = html;
  document.getElementById('btnExport').disabled = false;
}

function updateRow(i, key, val) { if (results[i]) results[i][key] = val; }
function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Export ──
function exportExcel() {
  if (!results.length) return;
  const headers = COLS.map(c => c.label);
  const rows = results.map(r => {
    if (r._status === 'error') return [r.nome_documento, 'ERRO', '', '', '', '', '', '', '', r._error || ''];
    return COLS.map(c => r[c.key] || '');
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [30,25,22,40,14,16,16,20,50,30].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws, 'IPTU');
  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `IPTU_Extraido_${ts}.xlsx`);
}

// ── Clear ──
function clearAll() {
  files = []; results = [];
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('progressArea').classList.remove('active');
  document.getElementById('stats').style.display = 'none';
  document.getElementById('tableScroll').innerHTML = `<div class="empty"><span class="icon">🗂</span><p>Faça upload dos PDFs e clique em <strong>Extrair dados</strong>.</p></div>`;
  updateButtons();
}
